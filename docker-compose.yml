services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: laravel_app
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./:/var/www
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - laravel

  web:
    image: nginx:1.27-alpine
    container_name: laravel_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - laravel

  db:
    image: mysql:8.4
    container_name: laravel_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      timeout: 5s
      retries: 10
      interval: 5s
    networks:
      - laravel

  redis:
    image: redis:7-alpine
    container_name: laravel_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 10
      interval: 5s
    networks:
      - laravel

  composer:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: laravel_composer
    working_dir: /var/www/backend
    volumes:
      - ./:/var/www
    entrypoint: ["composer"]
    profiles:
      - tools
    networks:
      - laravel

  artisan:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: laravel_artisan
    working_dir: /var/www/backend
    volumes:
      - ./:/var/www
    entrypoint: ["php", "/var/www/backend/artisan"]
    profiles:
      - tools
    networks:
      - laravel

  frontend:
    image: node:22-alpine
    container_name: laravel_frontend
    working_dir: /var/www/frontend
    volumes:
      - ./:/var/www
    ports:
      - "5173:5173"
    command: ["sh", "-lc", "npm install && npm run dev -- --host 0.0.0.0"]
    networks:
      - laravel

  node:
    image: node:22-alpine
    container_name: laravel_node
    working_dir: /var/www/frontend
    volumes:
      - ./:/var/www
    profiles:
      - tools
    entrypoint: ["npm"]
    networks:
      - laravel

volumes:
  dbdata:

networks:
  laravel:
    driver: bridge